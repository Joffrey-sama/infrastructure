- name: Backup K3s configuration
  hosts: wsl
  become: true

  tasks:
    - name: Create backup directory
      file:
        path: "{{ storage_path }}/backups"
        state: directory
        mode: '0755'

    - name: Backup K3s configuration
      archive:
        path:
          - /etc/rancher/k3s
          - "{{ storage_path }}"
        dest: "{{ storage_path }}/backups/k3s-backup-{{ ansible_date_time.iso8601 }}.tar.gz"
        format: gz