- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'

- name: Install K3s
  ansible.builtin.shell: |
    export INSTALL_K3S_VERSION={{ k3s_version }}
    export K3S_KUBECONFIG_MODE="0644"
    export INSTALL_K3S_EXEC="server {{ k3s_server_args | join(' ') }}"
    /tmp/k3s-install.sh

- name: Start K3s service
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Check and regenerate K3s server certificate if IP has changed
  block:
    - name: Check if API server certificate exists
      ansible.builtin.stat:
        path: /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt
      register: k3s_cert_stat

    - name: Read Subject Alternative Names (SANs) from certificate
      ansible.builtin.command: "openssl x509 -noout -text -in /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt"
      register: k3s_cert_info
      when: k3s_cert_stat.stat.exists
      changed_when: false

    - name: Force certificate regeneration if current IP is not in SANs
      when: k3s_cert_stat.stat.exists and ansible_host not in k3s_cert_info.stdout
      block:
        - name: "CERT REGEN: Stop K3s service"
          ansible.builtin.systemd:
            name: k3s
            state: stopped

        - name: "CERT REGEN: Remove dynamic certificate data"
          ansible.builtin.file:
            path: /var/lib/rancher/k3s/server/tls/dynamic-cert.json
            state: absent

        - name: "CERT REGEN: Restart K3s to force certificate regeneration"
          ansible.builtin.systemd:
            name: k3s
            state: restarted

- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0755'
  tags: [kubeconfig, kubeconfig-managed]
  become: false

- name: Copy kubeconfig
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ ansible_env.HOME }}/.kube/config" # Or the full path if KUBECONFIG might change
    remote_src: true
    mode: '0600'
  become: false
  tags: [kubeconfig, kubeconfig-managed]

# Configure kubectl on the Ansible control node
- name: Configure kubectl on Ansible control node for the K3s cluster
  tags: [kubeconfig, kubeconfig-control]
  delegate_to: localhost
  become: false
  run_once: true # Ensures this block runs only once
  block:
    - name: Check if remote kubeconfig exists on the managed node
      ansible.builtin.stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: remote_kubeconfig_stat
      delegate_to: "{{ inventory_hostname }}" # Run this check on the remote K3s node
      become: true # Need root privileges to stat /etc/rancher/k3s/k3s.yaml

    - name: Proceed with fetching and configuring kubeconfig on control node
      when: remote_kubeconfig_stat.stat.exists
      block:
        - name: Read remote kubeconfig content
          ansible.builtin.command: "sudo cat /etc/rancher/k3s/k3s.yaml"
          register: remote_kubeconfig_content
          delegate_to: "{{ inventory_hostname }}" # Run this command on the remote node
          changed_when: false # Reading a file doesn't change state
          # This task relies on passwordless sudo being configured by the common role

        - name: Ensure .kube directory exists on control node
          ansible.builtin.file:
            path: "{{ lookup('env', 'HOME') }}/.kube"
            state: directory
            mode: '0700'

        - name: Save K3s kubeconfig to a temporary file (renaming context to k3s)
          ansible.builtin.copy:
            content: >-
              {{ remote_kubeconfig_content.stdout 
              | replace('127.0.0.1', ansible_host) 
              | replace('0.0.0.0', ansible_host) 
              | replace('name: default', 'name: k3s') 
              | replace('cluster: default', 'cluster: k3s') 
              | replace('user: default', 'user: k3s') 
              | replace('current-context: default', 'current-context: k3s') 
              }}
            dest: "{{ lookup('env', 'HOME') }}/.kube/k3s_config_temp"
            mode: '0600'

        - name: Merge K3s config into main kubeconfig
          ansible.builtin.shell: |
            MAIN_CONFIG="{{ lookup('env', 'HOME') }}/.kube/config"
            TEMP_CONFIG="{{ lookup('env', 'HOME') }}/.kube/k3s_config_temp"

            if [ -f "$MAIN_CONFIG" ]; then
              KUBECONFIG="$MAIN_CONFIG:$TEMP_CONFIG" kubectl config view --flatten > "${MAIN_CONFIG}.tmp" && mv "${MAIN_CONFIG}.tmp" "$MAIN_CONFIG"
            else
              mv "$TEMP_CONFIG" "$MAIN_CONFIG"
            fi
            chmod 600 "$MAIN_CONFIG"
            rm -f "$TEMP_CONFIG"
          args:
            executable: /bin/bash

    - name: Notify if remote kubeconfig does not exist
      ansible.builtin.debug:
        msg: "Skipping kubeconfig copy to control node: Remote kubeconfig /etc/rancher/k3s/k3s.yaml does not exist on {{ inventory_hostname }}. Ensure K3s is installed and running (e.g., run playbook with -t k3s first)."
      when: not remote_kubeconfig_stat.stat.exists
