{{- if .Values.headscale.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-headscale-config
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yaml: |
    server_url: {{ .Values.headscale.publicUrl }}
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: false
    
    private_key_path: /var/lib/headscale/private.key
    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48

    derp:
      server:
        enabled: true
        private_key_path: /var/lib/headscale/derp_server_private.key
        region_id: 999
        region_code: "headscale"
        region_name: "Headscale Embedded DERP"
        stun_listen_addr: "0.0.0.0:3478"
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      paths: []
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: false
    ephemeral_node_inactivity_timeout: 30m
    node_id_length: 0

    dns:
      magic_dns: false
      base_domain: {{ .Values.headscale.dns.domain }}
      nameservers:
        global:
          - 1.1.1.1
      extra_records: []

    database:
      type: {{ .Values.headscale.database.type }}
      postgres:
        host: {{ .Values.headscale.database.host }}
        port: {{ .Values.headscale.database.port }}
        name: {{ .Values.headscale.database.name }}
        user: {{ .Values.headscale.database.user }}
        ssl: false

    {{- if .Values.headscale.oidc.enabled }}
    oidc:
      issuer: {{ .Values.headscale.oidc.issuer }}
      client_id: {{ .Values.headscale.oidc.clientId }}
      client_secret_path: /etc/secrets/client_secret
      scope: ["openid", "profile", "email"]
      extra_params:
        domain_hint: delva-home.fr
      allowed_domains: []
      allowed_groups: []
      allowed_users: []
    {{- end }}

    log:
      level: info
      format: text
{{- end }}