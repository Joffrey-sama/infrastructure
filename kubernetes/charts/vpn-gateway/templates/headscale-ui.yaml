{{- if .Values.headscaleui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-headscale-ui
  labels:
    app.kubernetes.io/name: headscale-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with .Values.headscaleui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: headscale-ui
          image: "{{ index .Values "headscaleui" "image" "repository" }}:{{ index .Values "headscaleui" "image" "tag" }}"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-headscale-ui
spec:
  type: ClusterIP
  ports:
    - port: {{ index .Values "headscaleui" "service" "port" }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: headscale-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}