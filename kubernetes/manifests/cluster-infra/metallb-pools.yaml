# Generic MetalLB IP pool configuration
# Note: actual IP ranges are cluster-specific and must be defined in the private repository.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: kube-system
spec:
  addresses:
    - placeholder_for_metallb_ip_range
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advert
  namespace: kube-system
spec:
  ipAddressPools:
    - first-pool
