name: "Terraform CI/CD"

on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
  workflow_call:
    inputs:
      directory:
        description: "Directory containing Terraform configuration"
        required: true
        type: string
      tfvars_file:
        description: "Path to tfvars file relative to directory"
        required: false
        type: string
        default: "prod.tfvars"
      mode:
        description: "Execution mode: 'plan' or 'apply'"
        required: false
        type: string
        default: "plan"

permissions:
  contents: write

jobs:
  terraform-ci:
    name: "Terraform Lint, Validate & Version Guard"
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "Setup TFLint"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: "Terraform Format Check"
        run: terraform fmt -check -recursive terraform/

      - name: "Terraform Validate & TFLint All Modules"
        run: |
          tflint --init || true
          find terraform/modules -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
            echo "=== Validating & Linting Terraform module: ${dir} ==="
            (cd "${dir}" && terraform init -backend=false && terraform validate && tflint)
          done

      - name: "Guardrail: Check Version Bump on Modified Modules"
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin --tags || true
          git fetch origin main:main || true

          FORK_POINT=$(git merge-base origin/main HEAD)
          MODIFIED_FILES=$(git diff --name-only "$FORK_POINT" HEAD)

          for mod_dir in terraform/modules/*/; do
            if [ -f "${mod_dir}VERSION" ]; then
              MOD_NAME=$(basename "${mod_dir}")
              MOD_VERSION=$(tr -d ' \n\r' < "${mod_dir}VERSION")
              TAG_NAME="tf-${MOD_NAME}-v${MOD_VERSION}"

              if echo "$MODIFIED_FILES" | grep -q "^${mod_dir}"; then
                echo "Module ${MOD_NAME} was modified in this PR. Target tag: ${TAG_NAME}"
                if git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
                  echo "::error file=${mod_dir}VERSION::Version ${MOD_VERSION} for module '${MOD_NAME}' already exists as tag '${TAG_NAME}'. You MUST bump '${mod_dir}VERSION' before merging!"
                  exit 1
                else
                  echo "SUCCESS: Version bump validated for ${MOD_NAME} (v${MOD_VERSION})."
                fi
              fi
            fi
          done

      - name: "Process Modified Modules: Tag & Release"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODIFIED_FILES=$(git diff --name-only HEAD~1 HEAD)

          for mod_dir in terraform/modules/*/; do
            if [ -f "${mod_dir}VERSION" ]; then
              MOD_NAME=$(basename "${mod_dir}")
              MOD_VERSION=$(tr -d ' \n\r' < "${mod_dir}VERSION")
              TAG_NAME="tf-${MOD_NAME}-v${MOD_VERSION}"

              if echo "$MODIFIED_FILES" | grep -q "^${mod_dir}"; then
                echo "--------------------------------------------------"
                echo "Publishing updated Terraform module: ${MOD_NAME} (v${MOD_VERSION}) -> Tag: ${TAG_NAME}"

                if git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
                  echo "::error::Tag ${TAG_NAME} already exists! Cannot overwrite existing release."
                  exit 1
                fi

                echo "Creating Git tag and GitHub Release ${TAG_NAME}..."
                git tag "${TAG_NAME}"
                git push origin "${TAG_NAME}"

                gh release create "${TAG_NAME}" \
                  --title "Release ${TAG_NAME}" \
                  --generate-notes
              fi
            fi
          done

  terraform-deploy:
    name: "Terraform Execution (${{ inputs.mode || 'plan' }})"
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "Terraform Init & Validate"
        run: |
          DIR="${{ inputs.directory }}"
          if [ -n "$DIR" ] && [ -d "$DIR" ]; then
            (cd "$DIR" && terraform init -backend=false && terraform validate)
          fi
