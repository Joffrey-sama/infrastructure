name: "Ansible CI/CD"

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: "Path to Ansible playbook (leave empty to syntax-check all)"
        required: false
        type: string
        default: ""
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible.yml'
  pull_request:
    paths:
      - 'ansible/**'
  workflow_call:
    inputs:
      playbook:
        description: "Path to Ansible playbook file in infrastructure repository"
        required: true
        type: string
      inventory:
        description: "Path to Ansible inventory file in delva-home-ops repository"
        required: false
        type: string
        default: "ansible/inventory/hosts.yml"
      mode:
        description: "Execution mode: 'check' or 'execute'"
        required: false
        type: string
        default: "check"

jobs:
  ansible:
    name: "Ansible Execution (${{ inputs.mode || 'check' }})"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Ansible"
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: "Ansible Syntax Check & Lint"
        run: |
          for pb in $(find ansible -name "*.yml" -o -name "*.yaml" | grep -v "group_vars" | grep -v "host_vars" | grep -v "roles"); do
            echo "=== Checking playbook: ${pb} ==="
            ansible-playbook "${pb}" --syntax-check
          done
