name: "Ansible CI/CD"

on:
  workflow_call:
    inputs:
      playbook:
        description: "Path to Ansible playbook file"
        required: true
        type: string
      inventory:
        description: "Path to Ansible inventory file"
        required: false
        type: string
        default: "inventory/hosts.ini"
      mode:
        description: "Execution mode: 'check' or 'execute'"
        required: false
        type: string
        default: "check"

jobs:
  ansible:
    name: "Ansible Execution (${{ inputs.mode }})"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Ansible"
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: "Setup SSH Key"
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Ansible Syntax Check"
        run: ansible-playbook -i "${{ inputs.inventory }}" "${{ inputs.playbook }}" --syntax-check

      - name: "Ansible Check (Dry Run)"
        if: ${{ inputs.mode == 'check' }}
        run: ansible-playbook -i "${{ inputs.inventory }}" "${{ inputs.playbook }}" --check --diff

      - name: "Ansible Execute"
        if: ${{ inputs.mode == 'execute' }}
        run: ansible-playbook -i "${{ inputs.inventory }}" "${{ inputs.playbook }}"
