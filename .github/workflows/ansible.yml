name: "Ansible CI/CD"

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: "Path to Ansible playbook"
        required: false
        type: string
        default: ""
  push:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible.yml"
  pull_request:
    paths:
      - "ansible/**"
  workflow_call:
    inputs:
      playbook:
        description: "Path to Ansible playbook file in infrastructure repository"
        required: true
        type: string
      inventory:
        description: "Path to Ansible inventory file in delva-home-ops repository"
        required: false
        type: string
        default: "ansible/inventory/hosts.yml"
      mode:
        description: "Execution mode: 'check' or 'execute'"
        required: false
        type: string
        default: "check"

permissions:
  contents: write

jobs:
  ansible-ci:
    name: "Ansible Lint, Build & Version Guard"
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Ansible & Tools"
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yq

      - name: "Ansible Syntax Check"
        env:
          ANSIBLE_ROLES_PATH: "ansible/roles"
        run: |
          find ansible/playbooks -type f \( -name "*.yml" -o -name "*.yaml" \) | while read -r pb; do
            echo "=== Syntax checking playbook: ${pb} ==="
            ansible-playbook "${pb}" --syntax-check || true
          done

      - name: "Ansible Collection Build Check"
        run: |
          echo "=== Testing Ansible Collection Build ==="
          (cd ansible && ansible-galaxy collection build --force)

      - name: "Guardrail: Check Version Bump on galaxy.yml"
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin --tags || true
          git fetch origin main:main || true

          FORK_POINT=$(git merge-base origin/main HEAD)
          MODIFIED_FILES=$(git diff --name-only "$FORK_POINT" HEAD)

          if echo "$MODIFIED_FILES" | grep -q "^ansible/"; then
            COLLECTION_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('ansible/galaxy.yml'))['version'])")
            TAG_NAME="ansible-v${COLLECTION_VERSION}"

            echo "Ansible files modified. Target tag: ${TAG_NAME}"
            if git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
              echo "::error file=ansible/galaxy.yml::Version ${COLLECTION_VERSION} in ansible/galaxy.yml already exists as tag '${TAG_NAME}'. You MUST bump 'version' in galaxy.yml before merging!"
              exit 1
            else
              echo "SUCCESS: Ansible Collection version bump validated (v${COLLECTION_VERSION})."
            fi
          fi

      - name: "Process Ansible Collection: Tag & Release"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODIFIED_FILES=$(git diff --name-only HEAD~1 HEAD)

          if echo "$MODIFIED_FILES" | grep -q "^ansible/"; then
            COLLECTION_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('ansible/galaxy.yml'))['version'])")
            TAG_NAME="ansible-v${COLLECTION_VERSION}"

            echo "Publishing Ansible Collection v${COLLECTION_VERSION} -> Tag: ${TAG_NAME}"

            if git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
              echo "::error::Tag ${TAG_NAME} already exists! Cannot overwrite existing release."
              exit 1
            fi

            echo "Creating Git tag and GitHub Release ${TAG_NAME}..."
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"

            gh release create "${TAG_NAME}" \
              --title "Release ${TAG_NAME}" \
              --notes "Ansible collection infrastructure updated to version ${COLLECTION_VERSION}."
          fi

  ansible-deploy:
    name: "Ansible Execution (${{ inputs.mode || 'check' }})"
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Ansible"
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: "Ansible Execution (${{ inputs.mode || 'check' }})"
        env:
          ANSIBLE_ROLES_PATH: "ansible/roles"
        run: |
          PLAYBOOK="${{ inputs.playbook }}"
          MODE="${{ inputs.mode || 'check' }}"
          if [ -n "$PLAYBOOK" ]; then
            if [ "$MODE" = "check" ]; then
              ansible-playbook "${PLAYBOOK}" --syntax-check
            else
              echo "Executing playbook ${PLAYBOOK} in mode ${MODE}"
            fi
          fi
